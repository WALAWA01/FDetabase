<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahaweli Authority | Secure Registry v3.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #003566;
            --accent: #ffc300;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1d3557;
            --error: #ff5555;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            margin: 0;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- ADVANCED SECURITY UI --- */
        #passwordOverlay {
            position: fixed;
            inset: 0;
            background: #000814;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 53, 102, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 195, 0, 0.05) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: white;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            animation: shimmer 6s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .security-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 195, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--accent);
            border: 1px solid rgba(255, 195, 0, 0.3);
            font-size: 1.8rem;
        }

        .auth-card input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 16px;
            width: 100%;
            box-sizing: border-box;
            font-size: 1.5rem;
            text-align: center;
            color: var(--accent);
            letter-spacing: 6px;
            margin: 20px 0;
            transition: 0.3s;
        }

        .auth-card input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
        }

        .btn-auth {
            background: var(--accent);
            color: var(--primary);
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* --- DASHBOARD UI --- */
        header {
            background: var(--primary);
            color: white;
            padding: 50px 20px 100px;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: -60px auto 50px;
            width: 90%;
        }

        .glass-card {
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) { .search-grid { grid-template-columns: 1fr; } }

        .input-group label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: #6c757d;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #f1f3f5;
            border-radius: 12px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent);
            outline: none;
        }

        /* --- DATA TABLE --- */
        .table-responsive {
            overflow-x: auto;
            border-radius: 15px;
            border: 1px solid #eee;
            margin-top: 20px;
        }

        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 0.8rem; color: #adb5bd; }
        td { padding: 15px; border-top: 1px solid #f8f9fa; }

        .badge {
            background: #eef2ff;
            color: #4361ee;
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .nic-label { font-family: monospace; color: #e63946; font-weight: 600; }

        .btn-print {
            background: #2b9348;
            color: white;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            border: none;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            display: none;
        }

        @media print {
            #passwordOverlay, header, .search-grid, .btn-print { display: none !important; }
            .container { margin: 0; width: 100%; }
            .glass-card { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

<div id="passwordOverlay">
    <div class="auth-card" id="authCard">
        <div class="security-icon"><i class="fas fa-shield-halved"></i></div>
        <h2 style="margin:0">Secure Entry</h2>
        <p>Access requires Department Token</p>
        
        <input type="password" id="passInput" placeholder="••••••" maxlength="6">
        
        <button class="btn-auth" id="authBtn" onclick="verify()">
            <span id="btnText">Unlock Database</span>
        </button>
        
        <p id="errMsg" style="color:var(--error); font-size: 0.8rem; display:none; margin-top:15px; font-weight:bold;">
            <i class="fas fa-times-circle"></i> INVALID ACCESS TOKEN
        </p>
    </div>
</div>

<header>
    <h1 style="margin:0; font-weight:800; letter-spacing: -1px;">MAHAWELI REGISTRY</h1>
    <p style="opacity:0.8">Official Member Information Management System</p>
</header>

<div class="container">
    <div class="glass-card">
        <div class="search-grid">
            <div class="input-group">
                <label>Search Society</label>
                <input type="text" id="socSearch" onkeyup="handleSearch('soc')" placeholder="e.g. Gamunu">
            </div>
            <div class="input-group">
                <label>Search NIC / ID</label>
                <input type="text" id="idSearch" onkeyup="handleSearch('id')" placeholder="e.g. 99312...">
            </div>
        </div>

        <div id="resultsContent" style="display:none;">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Member Name</th>
                            <th>Society</th>
                            <th>ID Number</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <button class="btn-print" id="printBtn" onclick="window.print()">
                <i class="fas fa-print"></i> Generate Official Report
            </button>
        </div>

        <div id="noData" style="display:none; text-align:center; padding:40px;">
            <i class="fas fa-search" style="font-size:2.5rem; color:#dee2e6; margin-bottom:10px;"></i>
            <p style="color:#adb5bd">No records match your criteria.</p>
        </div>
    </div>
</div>

<script>
    const db = [
        { name: "Supun", society: "Gamunu", phone: "071 307 1005", id: "993120723v" },
        { name: "Jayasooriya", society: "Gamunu", phone: "N/A", id: "982356753v" },
        { name: "Pradeep", society: "Udawalawa", phone: "N/A", id: "199901107" },
        { name: "Susantha", society: "Gamunu", phone: "071 307 1005", id: "983120723v" },
        { name: "hasitha", society: "Gamunu", phone: "N/A", id: "862356753v" },
        { name: "gamini", society: "Gamunu", phone: "071 307 1005", id: "883120723v" },
        { name: "lakshan", society: "Gamunu", phone: "N/A", id: "712356753v" },
        { name: "samantha", society: "Gamunu", phone: "071 307 1005", id: "903120723v" },
        { name: "kavinda", society: "Gamunu", phone: "N/A", id: "952356753v" },
        { name: "rukshila", society: "Gamunu", phone: "071 307 1005", id: "753120723v" },
        { name: "devinda", society: "Gamunu", phone: "N/A", id: "802356753v" },
    ];

    function verify() {
        const pin = document.getElementById('passInput');
        const card = document.getElementById('authCard');
        const btnText = document.getElementById('btnText');
        
        if(pin.value === "553455") {
            btnText.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authorizing...';
            setTimeout(() => {
                document.getElementById('passwordOverlay').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('passwordOverlay').style.display = "none";
                }, 600);
            }, 800);
        } else {
            card.classList.add('shake');
            document.getElementById('errMsg').style.display = "block";
            pin.value = "";
            setTimeout(() => card.classList.remove('shake'), 400);
        }
    }

    function handleSearch(mode) {
        const sVal = document.getElementById('socSearch').value.toLowerCase();
        const iVal = document.getElementById('idSearch').value.toLowerCase();
        
        if(mode === 'soc') document.getElementById('idSearch').value = "";
        else document.getElementById('socSearch').value = "";

        const query = mode === 'soc' ? sVal : iVal;
        
        if(!query) {
            document.getElementById('resultsContent').style.display = "none";
            document.getElementById('noData').style.display = "none";
            return;
        }

        const filtered = db.filter(item => 
            mode === 'soc' ? item.society.toLowerCase().includes(query) : item.id.toLowerCase().includes(query)
        );

        showResults(filtered);
    }

    function showResults(list) {
        const body = document.getElementById('tableBody');
        const content = document.getElementById('resultsContent');
        const noData = document.getElementById('noData');
        const printBtn = document.getElementById('printBtn');

        body.innerHTML = "";
        
        if(list.length > 0) {
            content.style.display = "block";
            noData.style.display = "none";
            printBtn.style.display = "block";
            list.forEach(row => {
                body.innerHTML += `
                    <tr>
                        <td style="font-weight:600">${row.name}</td>
                        <td><span class="badge">${row.society}</span></td>
                        <td><span class="nic-label">${row.id}</span></td>
                        <td>${row.phone}</td>
                    </tr>`;
            });
        } else {
            content.style.display = "none";
            noData.style.display = "block";
        }
    }

    // Keyboard support
    document.getElementById('passInput').addEventListener("keypress", (e) => {
        if(e.key === "Enter") verify();
    });
</script>

</body>
</html>
